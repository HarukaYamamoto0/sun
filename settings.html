<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sun — Settings</title>
    <link rel="stylesheet" href="/src/settings.css" />
</head>
<body>
<div class="container">
    <h1>Settings</h1>

    <div class="setting">
        <div class="setting-info">
            <label for="autostart">Launch at login</label>
            <span>Start Sun automatically on login</span>
        </div>
        <input type="checkbox" id="autostart" />
    </div>

    <div class="setting">
        <div class="setting-info">
            <label for="step">Brightness step</label>
            <span>Increment per slider tick</span>
        </div>
        <select id="step">
            <option value="1">1%</option>
            <option value="5">5%</option>
            <option value="10">10%</option>
            <option value="25">25%</option>
        </select>
    </div>

    <div class="setting">
        <div class="setting-info">
            <label for="resync">Resync brightness</label>
            <span>Periodically reapply brightness to prevent monitor resets</span>
        </div>
        <input type="checkbox" id="resync" />
    </div>

    <div class="setting" id="resync-interval-row">
        <div class="setting-info">
            <label for="resync-interval">Resync interval</label>
            <span>How often to reapply</span>
        </div>
        <select id="resync-interval">
            <option value="1000">1s</option>
            <option value="2000">2s</option>
            <option value="5000">5s</option>
            <option value="10000">10s</option>
        </select>
    </div>

    <button id="save">Save</button>
</div>
<script type="module" src="/src/settings.ts"></script>
</body>
</html>
